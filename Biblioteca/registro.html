<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="body-registro">
    <div class="registro-container">
        <div class="registro-contenido">
        <h1>REGISTRO</h1>
        
        <div class="campos-contenido">
            <div class="registro-campos" >
               
                <div class="input">
                    <input type="text" placeholder="Nombre">
                    <img src="assets/usuarioicon.png" class="img-registro"alt="icon usuario">
                    <div class="linea"></div>
                </div>
                
        
            </div>
            <div class="registro-campos" >
                
                <div class="input">
                    <input type=" email" placeholder="Correo">
                    <img src="assets/emailicon.png" class="img-registro"alt="icon correo">
                    <div class="linea"></div>
                </div>
                
                
            </div>
            <div class="registro-campos" >
                
                <div class="input">
                    <input type="tel" placeholder="Telefono">
                    <img src="assets/telefonoicon.png" class="img-registro"alt="icon telefono">
                    <div class="linea"></div>
                </div>

                
                
            </div>
            <div class="registro-campos" >
                
                <div class="input">
                    <input type="password" placeholder="Contraseña">
                    <img src="assets/checkicon.png" class="img-registro" alt="icon check">
                    <div class="linea"></div>
                </div>
                
                
            </div>

        </div>
        
        <button onclick="window.location.href='index.html'"> Registrar</button> 
  </div>  
    </div>
  
    
  <div>
</body>
</html>
