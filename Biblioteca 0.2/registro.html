<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body class="body-registro">
    <div class="registro-container">
        <div class="registro-contenido">
            <h1>REGISTRO</h1>

            <form action="PHP/Registro.php" method="POST" id="form-registro">
                <div class="campos-contenido">

                    <div class="registro-campos">
                        <div class="input">
                            <input type="text" name="nombre" placeholder="Nombre" required>
                            <img src="assets/usuarioicon.png" class="img-registro" alt="icon usuario">
                            <div class="linea"></div>
                        </div>
                    </div>

                    <div class="registro-campos">
                        <div class="input">
                            <input type="email" name="correo" placeholder="Correo" required>
                            <img src="assets/emailicon.png" class="img-registro" alt="icon correo">
                            <div class="linea"></div>
                        </div>
                    </div>

                    <div class="registro-campos">
                        <div class="input">
                            <input type="tel" name="telefono" placeholder="Teléfono" required pattern="[0-9]{10}">
                            <img src="assets/telefonoicon.png" class="img-registro" alt="icon telefono">
                            <div class="linea"></div>
                        </div>
                    </div>

                    <div class="registro-campos">
                        <div class="input">
                            <input type="password" name="contrasena" placeholder="Contraseña" required minlength="6">
                            <img src="assets/checkicon.png" class="img-registro" alt="icon check">
                            <div class="linea"></div>
                        </div>
                    </div>

                </div>

                <button type="submit">Registrar</button>
            </form>
        </div>
    </div>

    <script src="scripts/validacion.js"></script>
</body>
</html>
